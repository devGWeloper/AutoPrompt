# Dependencies are managed in requirements*.txt (not here):
# pip install -r requirements.txt          # runtime
# This file only holds tool configuration. Run from the backend/ directory
# (no editable install needed): `python -m pytest`, `python -m ruff check .`.

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.ruff]
line-length = 100
target-version = "py311"
